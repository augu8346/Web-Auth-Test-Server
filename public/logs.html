<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Logs - Auth Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #f43f5e;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .dot { height: 12px; width: 12px; background-color: var(--accent); border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        
        .back-btn { color: #cbd5e1; text-decoration: none; }
        .back-btn:hover { color: #fff; text-decoration: underline; }

        .log-entry {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            cursor: pointer;
            font-family: monospace;
            font-size: 1.1rem;
        }
        .log-header:hover { background: rgba(0,0,0,0.4); }
        .method { font-weight: bold; color: #38bdf8; width: 60px; display: inline-block; }
        .url { color: #a7f3d0; }
        .time { color: #94a3b8; font-size: 0.9rem; }
        
        .log-details {
            display: none;
            padding: 1rem;
            border-top: 1px solid var(--border);
        }
        .log-details.active { display: block; }
        
        pre {
            background: rgba(0,0,0,0.5);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            color: #fff;
            white-space: pre-wrap;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        h4 { margin-bottom: 0.5rem; color: #94a3b8; }
        
        #empty-state { text-align: center; color: #94a3b8; padding: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span class="dot"></span> Live Request Logs</h1>
            <a href="/" class="back-btn">&larr; Back to Home</a>
        </div>
        <p style="margin-bottom: 2rem; color: #cbd5e1;">Showing the last 50 requests hitting the server. Auto-updates every 2 seconds.</p>

        <div id="logs-container">
            <div id="empty-state">Waiting for requests...</div>
        </div>
    </div>

    <script>
        let lastLogsJSON = '';

        function toggleDetails(index) {
            const details = document.getElementById(`details-${index}`);
            details.classList.toggle('active');
        }

        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            if (logs.length === 0) {
                container.innerHTML = '<div id="empty-state">Waiting for requests...</div>';
                return;
            }

            // We only re-render if something changed, to preserve open dropdowns
            let currentLogsJSON = JSON.stringify(logs);
            if (currentLogsJSON === lastLogsJSON) return;
            lastLogsJSON = currentLogsJSON;

            container.innerHTML = '';
            logs.forEach((log, index) => {
                const el = document.createElement('div');
                el.className = 'log-entry';
                
                const timeStr = new Date(log.timestamp).toLocaleTimeString();
                
                el.innerHTML = `
                    <div class="log-header" onclick="toggleDetails(${index})">
                        <div>
                            <span class="method">${log.method}</span>
                            <span class="url">${log.url}</span>
                        </div>
                        <div class="time">${timeStr} - ${log.ip}</div>
                    </div>
                    <div class="log-details" id="details-${index}">
                        <h4>Headers</h4>
                        <pre>${JSON.stringify(log.headers, null, 2)}</pre>
                        <h4>Cookies</h4>
                        <pre>${JSON.stringify(log.cookies, null, 2)}</pre>
                        <h4>Query Parameters</h4>
                        <pre>${JSON.stringify(log.query, null, 2)}</pre>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                renderLogs(data);
            } catch (err) {
                console.error("Failed to fetch logs", err);
            }
        }

        fetchLogs();
        setInterval(fetchLogs, 2000);
    </script>
</body>
</html>
